<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanger AI — Ваш юрист Zetef</title>
  <meta name="description" content="Zanger AI — специализированная ИИ-платформа для правовой грамотности в РК." />
  <link rel="stylesheet" href="style.css" />
  <style>
    main { padding-top: 100px; } 

    /* Вкладки */
    .tab-pane { display: none; padding: 20px 0 60px; }
    .tab-pane.active { display: block; animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .nav-links a { cursor: pointer; }
    .nav-links a.active { font-weight: bold; border-bottom: 2px solid #ffffff; padding-bottom: 4px; }
    
    /* Авторизация */
    .auth-container { max-width: 400px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.1); border: 1px solid #e2e8f0; }
    .auth-container h2 { text-align: center; margin-bottom: 20px; color: #1e3a8a; }
    .auth-form input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
    .auth-form button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .auth-form button:hover { background: #1d4ed8; }
    
    /* Карточки */
    .feature-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.08); text-align: left; transition: transform 0.2s; }
    .feature-card:hover { transform: translateY(-5px); }
    .feature-card h3 { color: #1e3a8a; margin-bottom: 10px; font-size: 1.2rem; }
    .feature-card p { color: #475569; font-size: 0.95rem; line-height: 1.5; }
    .feature-icon { font-size: 2.5rem; margin-bottom: 15px; display: inline-block; padding: 10px; background: #eff6ff; border-radius: 10px; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }

    /* Светлый чат */
    .chat-header { background: linear-gradient(135deg, #1e3a8a, #2563eb) !important; color: #ffffff !important; border-bottom: none !important; }
    .chat-input-area { background: #f8fafc !important; border-top: 1px solid #e2e8f0 !important; }
    .chat-input { background: #ffffff !important; color: #1e293b !important; border: 1px solid #cbd5e1 !important; }
    .chat-input::placeholder { color: #94a3b8 !important; }
    .chat-send { background: #2563eb !important; color: white !important; }
    .chat-send:hover { background: #1d4ed8 !important; }
    .msg-bubble { box-shadow: 0 2px 5px rgba(0,0,0,0.05) !important; }

    /* Мобильное меню */
    .nav-inner { position: relative; display: flex; align-items: center; justify-content: space-between; }
    .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; margin-left: 15px; }
    .hamburger span { width: 25px; height: 3px; background: #ffffff; border-radius: 3px; transition: 0.3s; }
    
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links { 
        display: none; 
        position: absolute; 
        top: 100%; 
        left: 0; 
        width: 100%; 
        background: #1e3a8a !important; 
        flex-direction: column; 
        padding: 20px 0; 
        box-shadow: 0 10px 15px rgba(0,0,0,0.1); 
        border-top: 1px solid #e2e8f0; 
        z-index: 1000;
      }
      .nav-links.active-menu { display: flex !important; } 
      .nav-links li { margin: 12px 0; text-align: center; }
      .nav-links a { color: #1e3a8a !important; font-size: 1.1rem; }
      .nav-links a.active { color: #2563eb !important; border-bottom: 2px solid #2563eb !important; padding-bottom: 4px; }
    }
  </style>
</head>

        <span class="logo-icon">⚖️</span>
        <span>Zanger <em>AI</em></span>
      </a>
      
      <ul class="nav-links" id="navLinksMenu">

        <li><a class="tab-link" onclick="switchTab('tab-services')">Наши услуги</a></li>
        <li><a class="tab-link" onclick="switchTab('tab-auth')">Регистрация</a></li>
      </ul>
      
      <div class="nav-actions" style="display: flex; align-items: center;">
        <div class="lang-toggle" id="langToggle">
          <button class="lang-btn active" data-lang="ru" id="btnRU">RU</button>

        </div>
        
        <div class="hamburger" id="hamburgerBtn">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </nav>
